# Regenerates star-history SVGs after GitHub's 2026 stargazers API restriction.
# Uses repo GITHUB_TOKEN (admin/collaborator) — no PAT in README.
# Output: orphan branch `star-history` → assets/my-star-history/*.svg
name: Star History

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  # Refresh after someone stars (best-effort; GitHub may delay or omit)
  watch:
    types: [started]

permissions:
  contents: write

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: carsteneu/mystarhistory@v1
        with:
          repos: ${{ github.repository }}
