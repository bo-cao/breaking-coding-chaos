# Refresh star-history SVGs from real GitHub stargazer timestamps.
#
# GitHub (2026) restricts the stargazers list API to repo admins/collaborators.
# The default Actions GITHUB_TOKEN gets HTTP 403 on that endpoint, so a
# personal access token is required for chart generation.
#
# Setup (one-time, as repo owner):
#   1. Create a fine-grained PAT:
#      https://github.com/settings/personal-access-tokens/new
#      - Resource owner: you (bo-cao)
#      - Repository access: only this repo
#      - Permissions → Repository → Metadata: Read-only
#   2. Repo → Settings → Secrets and variables → Actions
#      → New repository secret
#      Name:  STAR_HISTORY_TOKEN
#      Value: the PAT
#   3. Actions → Star History → Run workflow
name: Star History

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  watch:
    types: [started]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check star count
        id: stars
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh api "repos/${{ github.repository }}" --jq .stargazers_count)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Stars: $count"

      - name: Resolve token for stargazers
        id: auth
        if: steps.stars.outputs.count != '0'
        env:
          STAR_HISTORY_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}
        run: |
          if [ -n "$STAR_HISTORY_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "Using repository secret STAR_HISTORY_TOKEN"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::STAR_HISTORY_TOKEN secret is not set. Skipping chart update."
            echo "Create a fine-grained PAT (Metadata: Read-only) and add it as STAR_HISTORY_TOKEN."
          fi

      - name: Generate charts
        if: steps.stars.outputs.count != '0' && steps.auth.outputs.has_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}
        run: |
          set -e
          # Prove the token can read stargazers before generating
          gh api -H "Accept: application/vnd.github.star+json" \
            "repos/${{ github.repository }}/stargazers" --jq 'length' >/dev/null

          git clone --depth 1 https://github.com/carsteneu/mystarhistory.git /tmp/msh
          python3 /tmp/msh/mystarhistory.py --repo "${{ github.repository }}" \
            --output assets/star-history-light.svg --title "Star History"
          python3 /tmp/msh/mystarhistory.py --repo "${{ github.repository }}" \
            --output assets/star-history-dark.svg --title "Star History" --dark

      - name: Strip legend repo label
        if: steps.stars.outputs.count != '0' && steps.auth.outputs.has_token == 'true'
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          for p in Path("assets").glob("star-history-*.svg"):
              t = p.read_text(encoding="utf-8")
              t2 = re.sub(
                  r'<rect width="\d+" height="32"[^/]*/>\s*'
                  r'<rect width="8" height="8"[^/]*/>\s*'
                  r'<text[^>]*>[^<]*</text>\s*',
                  '',
                  t,
                  count=1,
              )
              p.write_text(t2, encoding="utf-8")
              print("stripped", p)
          PY

      - name: Commit if changed
        if: steps.stars.outputs.count != '0' && steps.auth.outputs.has_token == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/star-history-light.svg assets/star-history-dark.svg
          git diff --staged --quiet && echo "No chart changes" && exit 0
          git commit -m "chore: refresh star history chart"
          git push
