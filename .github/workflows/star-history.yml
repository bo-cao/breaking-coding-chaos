# Refresh star-history SVGs from real GitHub stargazer timestamps.
#
# Default Actions GITHUB_TOKEN cannot list stargazers (HTTP 403 after 2026).
# You must add a PAT as repository secret STAR_HISTORY_TOKEN.
#
# Setup (repo owner, one-time):
#   Classic PAT: https://github.com/settings/tokens/new  → scope public_repo
#   Or fine-grained: this repo only, Metadata: Read-only
#   Repo → Settings → Secrets and variables → Actions
#     Name: STAR_HISTORY_TOKEN  Value: <PAT>
#   Then: Actions → Star History → Run workflow (branch master)
#
# A green check with 0 chart commits means the job skipped (no stars / no token),
# not that the README image was regenerated.
name: Star History

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  # Do NOT use `watch` — every star re-runs the job; without a PAT it fails red.

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check star count
        id: stars
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh api "repos/${{ github.repository }}" --jq .stargazers_count)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Stars: $count"

      - name: Resolve token for stargazers
        id: auth
        env:
          STAR_HISTORY_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}
        run: |
          if [ -n "$STAR_HISTORY_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "Using repository secret STAR_HISTORY_TOKEN"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::STAR_HISTORY_TOKEN secret is not set. Skipping chart update."
          fi

      - name: Skip reason
        if: steps.stars.outputs.count == '0' || steps.auth.outputs.has_token != 'true'
        run: |
          echo "Job will succeed without changing assets."
          echo "stars=${{ steps.stars.outputs.count }} has_token=${{ steps.auth.outputs.has_token }}"
          echo "README chart is only updated when stars>0 AND STAR_HISTORY_TOKEN is set."

      - name: Generate charts
        if: steps.stars.outputs.count != '0' && steps.auth.outputs.has_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}
        run: |
          set -e
          gh api -H "Accept: application/vnd.github.star+json" \
            "repos/${{ github.repository }}/stargazers" --jq 'length' >/dev/null

          git clone --depth 1 https://github.com/carsteneu/mystarhistory.git /tmp/msh
          python3 /tmp/msh/mystarhistory.py --repo "${{ github.repository }}" \
            --output assets/star-history-light.svg --title "Star History"
          python3 /tmp/msh/mystarhistory.py --repo "${{ github.repository }}" \
            --output assets/star-history-dark.svg --title "Star History" --dark

      - name: Strip legend repo label
        if: steps.stars.outputs.count != '0' && steps.auth.outputs.has_token == 'true'
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          for p in Path("assets").glob("star-history-*.svg"):
              t = p.read_text(encoding="utf-8")
              t2 = re.sub(
                  r'<rect width="\d+" height="32"[^/]*/>\s*'
                  r'<rect width="8" height="8"[^/]*/>\s*'
                  r'<text[^>]*>[^<]*</text>\s*',
                  '',
                  t,
                  count=1,
              )
              p.write_text(t2, encoding="utf-8")
              print("stripped", p)
          PY

      - name: Commit if changed
        if: steps.stars.outputs.count != '0' && steps.auth.outputs.has_token == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/star-history-light.svg assets/star-history-dark.svg
          if git diff --staged --quiet; then
            echo "SVG unchanged — no commit (README will look the same)."
            exit 0
          fi
          git commit -m "chore: refresh star history chart"
          git push
          echo "Pushed new chart SVGs. Hard-refresh the repo page (Ctrl+F5)."
